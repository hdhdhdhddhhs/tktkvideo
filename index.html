<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --accent: #fe2c55;
      --muted: #888888;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 1rem;
    }
    span { color: var(--accent); }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--text);
      color: var(--bg);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
  </style>
</head>
<body>

<div class="container">
  <h1>Thank <span>You.</span></h1>
  <p>I appreciate you taking the time to use this tool. Your support means everything—built with passion for the creators and the community.</p>
  <a href="/" class="btn">Return Home</a>
</div>

</body>
</html>
