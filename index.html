<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Downloader</title>
  <style>
    body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
    .card { background: #141414; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; }
    button { width: 100%; padding: 10px; background: #fe2c55; border: none; color: white; border-radius: 6px; cursor: pointer; }
    #result { display: none; margin-top: 20px; }
  </style>
</head>
<body>
<div class="card">
  <input type="text" id="url" placeholder="Paste link...">
  <button id="fetchBtn" onclick="fetchVideo()">Fetch</button>
  <div id="result">
    <button onclick="startDownload()">Download Video</button>
  </div>
</div>
<script>
  let videoUrl = "";
  async function fetchVideo() {
    const url = document.getElementById('url').value;
    const res = await fetch('/api/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    videoUrl = data.play;
    document.getElementById('result').style.display = 'block';
  }
  function startDownload() {
    window.location.href = `/api/download?url=${encodeURIComponent(videoUrl)}`;
  }
</script>
</body>
</html>
